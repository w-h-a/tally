services:
  tally:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9090:9090"
      - "8081:8081"
    environment:
      - TALLY_GRPC_PORT=9090
      - TALLY_HEALTH_PORT=8081
      - TALLY_DATA_DIR=/data
      - TALLY_NODE_ID=tally-0
      - TALLY_RPC_ADDR=tally:9090
    volumes:
      - tally-data:/data

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "8080:8080"
    environment:
      - TALLY_HTTP_PORT=8080
      - TALLY_ADDR=tally:9090
    depends_on:
      - tally

volumes:
  tally-data:
