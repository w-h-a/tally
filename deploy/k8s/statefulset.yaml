apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tally
  namespace: tally
  labels:
    app: tally
    version: VERSION_PLACEHOLDER
spec:
  serviceName: tally
  replicas: 3
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: tally
  template:
    metadata:
      labels:
        app: tally
        version: VERSION_PLACEHOLDER
    spec:
      containers:
        - name: tally
          image: IMAGE_PLACEHOLDER
          command: ["/bin/sh", "-c"]
          args:
            - |
              case "${HOSTNAME##*-}" in
                0) export TALLY_BOOTSTRAP=true ;;
                *) export TALLY_BOOTSTRAP=false ;;
              esac
              exec /tally
          ports:
            - name: health
              containerPort: 8080
            - name: grpc
              containerPort: 9090
            - name: raft
              containerPort: 9091
            - name: serf
              containerPort: 9092
          env:
            - name: VERSION
              value: VERSION_PLACEHOLDER
            - name: TALLY_HEALTH_PORT
              value: "8080"
            - name: TALLY_GRPC_PORT
              value: "9090"
            - name: TALLY_DATA_DIR
              value: /data
            - name: TALLY_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: TALLY_RPC_ADDR
              value: $(TALLY_NODE_ID).tally.tally.svc.cluster.local:9090
            - name: TALLY_RAFT_ADDR
              value: $(TALLY_NODE_ID).tally.tally.svc.cluster.local:9091
            - name: TALLY_SERF_ADDR
              value: "0.0.0.0:9092"
            - name: TALLY_SERF_JOIN
              value: tally-0.tally.tally.svc.cluster.local:9092,tally-1.tally.tally.svc.cluster.local:9092,tally-2.tally.tally.svc.cluster.local:9092
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.otel-collector.svc.cluster.local:4317
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: do-block-storage
        resources:
          requests:
            storage: 1Gi
