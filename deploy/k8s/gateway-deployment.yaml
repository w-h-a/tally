apiVersion: apps/v1
kind: Deployment
metadata:
  name: tally-gateway
  namespace: tally
  labels:
    app: tally-gateway
    version: VERSION_PLACEHOLDER
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tally-gateway
  template:
    metadata:
      labels:
        app: tally-gateway
        version: VERSION_PLACEHOLDER
    spec:
      containers:
        - name: tally-gateway
          image: GATEWAY_IMAGE_PLACEHOLDER
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: VERSION
              value: VERSION_PLACEHOLDER
            - name: TALLY_HTTP_PORT
              value: "8080"
            - name: TALLY_ADDR
              value: tally-0.tally.tally.svc.cluster.local:9090
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.otel-collector.svc.cluster.local:4317
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
