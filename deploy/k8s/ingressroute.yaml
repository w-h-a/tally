apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tally-gateway
  namespace: tally
  annotations:
    external-dns.alpha.kubernetes.io/target: lb.weslab.vip
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`tally.weslab.vip`)
      kind: Rule
      services:
        - name: tally-gateway
          port: 8080
  tls:
    secretName: tally-tls
