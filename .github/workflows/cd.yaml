name: CD

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  DOCKER_REPO_PATH: ${{ secrets.DOCKER_USERNAME }}/tally

jobs:
  semver_tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tagger.outputs.next }}
      is_released: ${{ steps.tagger.outputs.next != steps.tagger.outputs.current }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: tagger
        uses: ietf-tools/semver-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          noVersionBumpBehavior: current

      - if: steps.tagger.outputs.next != steps.tagger.outputs.current
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tagger.outputs.next }}
          generate_release_notes: true

  build_push:
    runs-on: ubuntu-latest
    needs: [semver_tag]
    if: needs.semver_tag.outputs.is_released == 'true'
    outputs:
      image_tag: ${{ needs.semver_tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_REPO_PATH }}:${{ needs.semver_tag.outputs.new_tag }}
            ${{ env.DOCKER_REPO_PATH }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: [semver_tag, build_push]
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Set image and version in manifests
        env:
          IMAGE_TAG: ${{ needs.build_push.outputs.image_tag }}
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|${{ env.DOCKER_REPO_PATH }}:${IMAGE_TAG}|" deploy/k8s/deployment.yaml
          sed -i "s|VERSION_PLACEHOLDER|${IMAGE_TAG}|" deploy/k8s/deployment.yaml

      - name: Apply manifests
        run: kubectl apply -f deploy/k8s/

      - name: Verify rollout
        run: kubectl rollout status deployment/tally -n tally --timeout=120s
