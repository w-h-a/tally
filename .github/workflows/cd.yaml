name: CD

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  DOCKER_REPO_PATH: ${{ secrets.DOCKER_USERNAME }}/tally

jobs:
  semver_tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tagger.outputs.next }}
      is_released: ${{ steps.tagger.outputs.next != steps.tagger.outputs.current }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: tagger
        uses: ietf-tools/semver-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          noVersionBumpBehavior: current

      - if: steps.tagger.outputs.next != steps.tagger.outputs.current
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tagger.outputs.next }}
          generate_release_notes: true

  build_push:
    runs-on: ubuntu-latest
    needs: [semver_tag]
    if: needs.semver_tag.outputs.is_released == 'true'
    outputs:
      image_tag: ${{ needs.semver_tag.outputs.new_tag }}
    env:
      BUILDEVENT_APIKEY: ${{ secrets.HONEYCOMB_API_KEY }}
      BUILDEVENT_DATASET: "cd"
    steps:
      - uses: actions/checkout@v4

      - name: Install buildevents
        run: |
          curl -sL -o buildevents https://github.com/honeycombio/buildevents/releases/latest/download/buildevents-linux-amd64
          chmod 755 buildevents
          sudo mv buildevents /usr/local/bin/

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        run: |
          STEP_START=$(date +%s)
          buildevents cmd $GITHUB_RUN_ID build-push build-push -- docker buildx build \
            --push \
            --tag ${{ env.DOCKER_REPO_PATH }}:${{ needs.semver_tag.outputs.new_tag }} \
            --tag ${{ env.DOCKER_REPO_PATH }}:latest \
            .
          buildevents step $GITHUB_RUN_ID build-push $STEP_START build-push

  deploy:
    runs-on: ubuntu-latest
    needs: [semver_tag, build_push]
    env:
      BUILDEVENT_APIKEY: ${{ secrets.HONEYCOMB_API_KEY }}
      BUILDEVENT_DATASET: "cd"
    steps:
      - uses: actions/checkout@v4

      - name: Install buildevents
        run: |
          curl -sL -o buildevents https://github.com/honeycombio/buildevents/releases/latest/download/buildevents-linux-amd64
          chmod 755 buildevents
          sudo mv buildevents /usr/local/bin/
          echo "BUILD_START=$(date +%s)" >> "$GITHUB_ENV"

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save homelab-sfo3

      - name: Set image and version in manifests
        env:
          IMAGE_TAG: ${{ needs.build_push.outputs.image_tag }}
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|${{ env.DOCKER_REPO_PATH }}:${IMAGE_TAG}|" deploy/k8s/deployment.yaml
          sed -i "s|VERSION_PLACEHOLDER|${IMAGE_TAG}|" deploy/k8s/deployment.yaml

      - name: Apply and verify
        run: |
          STEP_START=$(date +%s)
          buildevents cmd $GITHUB_RUN_ID deploy deploy -- bash -c '
            kubectl apply -f deploy/k8s/ &&
            kubectl rollout status deployment/tally -n tally --timeout=120s
          '
          buildevents step $GITHUB_RUN_ID deploy $STEP_START deploy

      - name: Finalize trace
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            buildevents build $GITHUB_RUN_ID $BUILD_START success
          else
            buildevents build $GITHUB_RUN_ID $BUILD_START failure
          fi
